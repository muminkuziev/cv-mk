<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>CV</title>
<style>
body{font-family:Arial;background:#f4f4f5;padding:30px;color:#111}
.cv{max-width:800px;margin:auto;background:white;padding:35px;border-radius:12px}
h1{margin:0;font-size:32px} .job{color:#555;margin:6px 0 20px}
.box{background:#f1f5f9;padding:12px;border-radius:10px;margin-bottom:20px}
h2{border-bottom:1px solid #ddd;padding-bottom:6px}
p{white-space:pre-line;line-height:1.6}
</style></head>
<body><div class="cv">
<h1>{{ full_name }}</h1><div class="job">{{ profession }}</div>
<div class="box">{{ phone }} | {{ email }} | {{ address }}</div>
<h2>Ish tajribasi</h2><p>{{ experience }}</p>
<h2>Ta'lim</h2><p>{{ education }}</p>
<h2>Ko‘nikmalar</h2><p>{{ skills }}</p>
<h2>Tillar</h2><p>{{ languages }}</p>
</div></body></html>
