<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>{{ full_name }} - CV</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f3f4f6;
      color: #111827;
      padding: 30px;
    }
    .cv {
      max-width: 800px;
      margin: auto;
      background: white;
      padding: 35px;
      border-radius: 18px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.12);
    }
    h1 {
      margin-bottom: 5px;
      font-size: 34px;
      color: #111827;
    }
    .profession {
      color: #2563eb;
      font-size: 18px;
      margin-bottom: 25px;
    }
    .contact {
      background: #eff6ff;
      padding: 14px;
      border-radius: 12px;
      margin-bottom: 25px;
      font-size: 14px;
    }
    h2 {
      margin-top: 25px;
      color: #111827;
      border-bottom: 2px solid #2563eb;
      padding-bottom: 6px;
      font-size: 20px;
    }
    p {
      line-height: 1.7;
      white-space: pre-line;
    }
    .footer {
      margin-top: 35px;
      font-size: 12px;
      color: #6b7280;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="cv">
    <h1>{{ full_name }}</h1>
    <div class="profession">{{ profession }}</div>

    <div class="contact">
      <strong>Telefon:</strong> {{ phone }}<br>
      <strong>Email:</strong> {{ email }}<br>
      <strong>Manzil:</strong> {{ address }}
    </div>

    <h2>Ish tajribasi</h2>
    <p>{{ experience }}</p>

    <h2>Ta'lim</h2>
    <p>{{ education }}</p>

    <h2>Ko‘nikmalar</h2>
    <p>{{ skills }}</p>

    <h2>Tillar</h2>
    <p>{{ languages }}</p>

    <div class="footer">
      ZiyoCVBot orqali yaratildi • {{ date }}
    </div>
  </div>
</body>
</html>
