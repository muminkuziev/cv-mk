<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>CV</title>
<style>
body{font-family:Arial;background:#0f172a;padding:30px;color:#e5e7eb}
.cv{max-width:850px;margin:auto;background:#111827;padding:38px;border-radius:28px;border:1px solid #334155}
h1{font-size:38px;margin:0;color:#facc15}.job{color:#cbd5e1;margin:8px 0 20px}
.contact{background:#1e293b;padding:14px;border-radius:14px;margin-bottom:25px}
h2{color:#facc15;border-bottom:1px solid #334155;padding-bottom:8px;margin-top:25px}
p{white-space:pre-line;line-height:1.7;color:#d1d5db}
.footer{text-align:center;color:#94a3b8;font-size:12px;margin-top:30px}
</style></head>
<body><div class="cv">
<h1>{{ full_name }}</h1><div class="job">{{ profession }}</div>
<div class="contact">{{ phone }} | {{ email }} | {{ address }}</div>
<h2>Ish tajribasi</h2><p>{{ experience }}</p>
<h2>Ta'lim</h2><p>{{ education }}</p>
<h2>Ko‘nikmalar</h2><p>{{ skills }}</p>
<h2>Tillar</h2><p>{{ languages }}</p>
<div class="footer">ZiyoCVBot • {{ date }}</div>
</div></body></html>
