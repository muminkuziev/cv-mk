<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>CV</title>
<style>
body{font-family:Arial;background:linear-gradient(135deg,#dbeafe,#fdf2f8);padding:30px}
.cv{max-width:850px;margin:auto;background:white;padding:35px;border-radius:24px;box-shadow:0 25px 70px #0002}
.top{background:linear-gradient(135deg,#2563eb,#9333ea);color:white;padding:28px;border-radius:18px}
h1{margin:0;font-size:34px}.job{opacity:.9;margin-top:8px}
.contact{margin-top:14px;font-size:14px}
h2{color:#2563eb;margin-top:25px}
p{white-space:pre-line;line-height:1.7;color:#374151}
</style></head>
<body><div class="cv">
<div class="top">
<h1>{{ full_name }}</h1><div class="job">{{ profession }}</div>
<div class="contact">{{ phone }} • {{ email }} • {{ address }}</div>
</div>
<h2>Ish tajribasi</h2><p>{{ experience }}</p>
<h2>Ta'lim</h2><p>{{ education }}</p>
<h2>Ko‘nikmalar</h2><p>{{ skills }}</p>
<h2>Tillar</h2><p>{{ languages }}</p>
</div></body></html>
